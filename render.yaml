services:
  - type: web
    name: backend-transfusional
    runtime: python
    # Indicamos la ruta al build.sh dentro de la carpeta backend
    buildCommand: "./build.sh"
    # Comando con keepalive y timeout para el balanceador de Render
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --keep-alive 5 --timeout 120"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sgt-db # Debe coincidir con el nombre de tu DB en Render
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0" # Ajusta a tu versión