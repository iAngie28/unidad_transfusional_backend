services:
  - type: web
    name: backend-transfusional
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --keep-alive 5 --timeout 120"
    healthCheckPath: "/health/"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sgt-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: sgt-db
    plan: free
