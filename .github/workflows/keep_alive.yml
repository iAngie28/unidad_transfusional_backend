name: Unidad Transfusional Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render services
        env:
          BACKEND_URL: https://backend-transfusional.onrender.com/health/
          FRONTEND_URL: https://unidad-transfusional-frontend.onrender.com
        run: |
          curl --fail --silent --show-error --location --max-time 90 --retry 3 --retry-delay 10 -A "Mozilla/5.0" "$BACKEND_URL"
          curl --fail --silent --show-error --location --max-time 90 --retry 3 --retry-delay 10 -A "Mozilla/5.0" "$FRONTEND_URL"
