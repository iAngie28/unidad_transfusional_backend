name: Taller Pro Revividor
on:
  schedule:
    - cron: '*/10 * * * *' # Cada 10 min es suficiente (Render suspende a los 15)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Despertar Servicios
        run: |
          # Usamos -L para seguir redirecciones y un User-Agent de navegador
          curl -A "Mozilla/5.0" -sL https://tu-app-api.onrender.com/api/v1/health
          curl -A "Mozilla/5.0" -sL https://tu-app-cliente.onrender.com